
#user  nobody;
worker_processes  1;
#env $logspath c:/logs
error_log  logs/error.log ;
#error_log  logs/error.log  notice;
#error_log  logs/error.log  info;

#pid        logs/nginx.pid;


events {
    worker_connections  1024;
}


http {
	include       mime.types;
    default_type  application/octet-stream;

	map $COOKIE_abcdexpid $group {
	default root;
	}

	map $uri $log_filter {
			default 1;
			~^(.*\.(css)$) 0;
	}

etag on;
	
    log_format  main0  
		'$http_referer ,$remote_addr, $connection, $connection_requests, $time_iso8601, $status, $uri, $user, $JSESSIONID, $remote_addr, $host, $scheme, $server_name';
	log_format  main1	'$http_uri ,$uri';

    log_format  main  escape=json 

'{"remote_addr": "$remote_addr", "connection": "$connection", "connection_requests": "$connection_requests", "status": "$status", "request": "$request", "http_upgrade":"$http_upgrade","time_local": "$time_local", "scheme": "$scheme", "user":"$user", ”JSESSIONID“:"$JSESSIONID", "request_body": "$request_body", "body_bytes_sent": "$body_bytes_sent", "http_referer": "$http_referer", "http_user_agent": "$http_user_agent", "http_x_forwarded_for": "$http_x_forwarded_for", "http_upgrade": "$http_upgrade", "remote_user": "$remote_user"},';


    #sendfile        on;
    keepalive_timeout  65;

    gzip  on;

	#add_header  Content-MD5  $file_md5;

	server {
		listen 80;
        server_name qio;
		rewrite ^(.*)$ https://${server_name}$1 permanent; 
	}

	# proxy_cache_path data/cache levels=1:2 keys_zone=Javacache:10m max_size=1g use_temp_path=off;
        access_log  logs/access0.log  
		main0 		
		#buffer=256k flush=5s
		;
    server {
		# 监听 tcp4 并开启 http2
		listen 443 ssl;
		# 监听 tcp6 并开启 http2
		listen [::]:443 ssl;
		http2 on;


        #对应你的域名
		# server_name qio.wiki;
        # ssl_certificate ./conf/cert/qio.wiki_bundle.crt;
        # ssl_certificate_key ./conf/cert/qio.wiki.key;
		
        server_name	qio;
		ssl_certificate		./conf/cert/mkcert/qio+3.pem;
        ssl_certificate_key ./conf/cert/mkcert/qio+3-key.pem;

        ssl_session_timeout 65;
        ssl_protocols TLSv1 TLSv1.1 TLSv1.2;
        ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:HIGH:!aNULL:!MD5:!RC4:!DHE;
        ssl_prefer_server_ciphers on;
        #如果是静态文件,直接指向目录,如果是动态应用,用proxy_pass转发一下
		
        set $user "";
        if ( $http_cookie ~* "qio.csrf-token=.*?\%7C(.+?)(?=;|$)" ) {
            set $user $1;
        }

        set $JSESSIONID "";
        if ($http_cookie ~* "JSESSIONID=(.+?)(?=;|$)" ){
            set $JSESSIONID $1;
        } 


        access_log  logs/access.log  
		main   		buffer=256k flush=5s;
		
		location / {
			# root C:/dev/wei/w;  # 设置根目录为 C:/dev/w
            # index index.html index.htm;  # 可选的索引文件设置
        #access_log  logs/access.log  main1;# buffer=256k flush=5s;
			proxy_pass  http://127.0.0.1:83;
		}

		location ~ /assets {
			root   html;
			index  index.html index.htm;
			proxy_pass  http://127.0.0.1:83;
		}


		location /p/ {
			proxy_pass  http://127.0.0.1:831/;
		}
		location ~ /(?:j|race|qianxue_gl|file|business|jc|sj) {
			root   html;
			index  index.html index.htm;



		proxy_pass  http://127.0.0.1:89;
		# proxy_cache Javacache;
# proxy_cache_valid any 60m;



		}


		location /favicon.ico {
			root  html;
		}
		
		location ~ /\w+\.pdf$ {
			root  html;
		}

		location /q/ {
			proxy_pass  http://127.0.0.1:81/;
		}

		location /a/ {
			proxy_pass  http://127.0.0.1:84/;
		}

		location /w/ {
			proxy_pass  http://127.0.0.1:83/;
		}


		location /n/ {
			proxy_pass  http://127.0.0.1:85/;
		}
		location /_next/ { 
			proxy_pass  http://127.0.0.1:85/_next/;
		}
		location /api/ { 
			proxy_pass  http://127.0.0.1:85/api/;
		}
		location /signin/github { 
			proxy_pass  http://127.0.0.1:85/signin/github;
		}



		location /free/ {
			proxy_pass  http://127.0.0.1:86/free/;
		}
		location ~ /free/static {
			root   html;
			index  index.html index.htm;
			proxy_pass  http://127.0.0.1:86;
		}

		location ~ /(?:netinnet_product) {
			# root   html;
			# index  index.html index.htm;
			proxy_pass  http://dx.tk.netinnet.cn;
  # 需要添加的代码
			proxy_set_header X-Real-IP $remote_addr;

			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

			proxy_set_header Host $host;

			proxy_set_header Upgrade-Insecure-Requests 1;

			proxy_set_header X-Forwarded-Proto https;
		}

        # redirect server error pages to the static page /50x.html
		location ~ /(?:netinnet_glkj_v60) {
			# root   html;
			# index  index.html index.htm;
			proxy_pass  http://113.204.227.35:8080;
	  # 需要添加的代码
			proxy_set_header X-Real-IP $remote_addr;

			proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

			proxy_set_header Host $host;

			proxy_set_header Upgrade-Insecure-Requests 1;

			proxy_set_header X-Forwarded-Proto https;
		}

        # redirect server error pages to the static page /50x.html
        #
        error_page   500 502 503 504  /50x.html;
        location = /50x.html {
            root   html;
        }


    }

	#include n.conf;
}
